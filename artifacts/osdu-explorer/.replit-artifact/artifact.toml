kind = "web"
previewPath = "/"
title = "OSDU Explorer"
version = "1.0.0"
id = "artifacts/osdu-explorer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22843

[services.development]
run = "pnpm --filter @workspace/osdu-explorer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/osdu-explorer", "run", "build" ]
publicDir = "artifacts/osdu-explorer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22843"
BASE_PATH = "/"
